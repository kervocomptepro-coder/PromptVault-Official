<script>
    // 1. Real-time Hardware Fluctuations
    setInterval(() => {
        document.getElementById('cpu-load').innerText = (11 + Math.random() * 4).toFixed(1) + "%";
        document.getElementById('latency').innerText = Math.floor(12 + Math.random() * 8) + "ms";
    }, 1500);

    // 2. Global Decryption Log Generator (The Missing Piece)
    const logContainer = document.getElementById('traffic-feed');
    const cityNodes = ["SEOUL", "DUBAI", "SINGAPORE", "ZUG", "REYKJAVIK"];
    const protocols = ["SHADOW_PSYCHE", "MOAT_LOGIC", "VC_PITCH", "VIRAL_ARCHITECT"];

    function addLogEntry() {
        const node = cityNodes[Math.floor(Math.random() * cityNodes.length)];
        const prot = protocols[Math.floor(Math.random() * protocols.length)];
        const id = Math.random().toString(36).substring(7).toUpperCase();
        
        const entry = document.createElement('div');
        entry.style.cssText = "margin-bottom: 12px; border-left: 1px solid #00f2ff; padding-left: 10px; animation: fadeIn 0.5s ease-out;";
        entry.innerHTML = `
            <span style="color: #4ade80; font-size: 0.6rem;">[SUCCESS]</span><br>
            <span style="color: #94a3b8;">NODE:</span> ${node}_${id}<br>
            <span style="color: #00f2ff;">PROT:</span> ${prot}
        `;
        
        logContainer.prepend(entry);
        if (logContainer.childNodes.length > 7) logContainer.removeChild(logContainer.lastChild);
    }

    // Start the global feed
    setInterval(addLogEntry, 2500);

    // 3. Decryption Logic
    function unlock() {
        const btn = document.getElementById('mainBtn');
        const term = document.getElementById('term');
        btn.innerText = "PENETRATING FIREWALL...";
        term.innerText = "> Initializing Deep-Packet Inspection...";

        fetch('/generate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                category: document.getElementById('category').value, 
                topic: document.getElementById('topic').value,
                entropy: document.getElementById('entropy').value
            })
        }).then(r => r.json()).then(data => {
            document.getElementById('response-area').style.display = 'block';
            document.getElementById('output').innerText = data.result;
            btn.innerText = "INITIALIZE DECRYPTION";
            term.innerText = "> Decryption Complete. Results displayed in Neural Link.";
        });
    }

    function checkLock() {
        if(document.getElementById('category').value.includes('PREMIUM')) {
            document.getElementById('paywall').style.display = 'flex';
        }
    }

    function copyText() {
        navigator.clipboard.writeText(document.getElementById('output').innerText);
        const term = document.getElementById('term');
        term.innerText = "> Data String Stored in Local Memory.";
    }
</script>
