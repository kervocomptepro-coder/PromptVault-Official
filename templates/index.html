<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROMPT VAULT | NEURAL INTERFACE v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --dark: #020617; --card: rgba(15, 23, 42, 0.7); --alert: #ff0055; }
        body { 
            margin: 0; background: var(--dark); color: white; font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .vault-frame {
            position: relative; width: 500px; padding: 40px; background: var(--card); backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 2px; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .vault-frame::before { content: ""; position: absolute; top: -2px; left: -2px; width: 30px; height: 30px; border-top: 2px solid var(--neon); border-left: 2px solid var(--neon); }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; letter-spacing: 5px; color: var(--neon); margin-bottom: 30px; text-align: center; }
        
        .label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: #64748b; margin-bottom: 8px; display: block; }
        select, input {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #1e293b; padding: 15px; border-radius: 4px;
            color: white; margin-bottom: 20px; font-family: 'Inter', sans-serif; box-sizing: border-box; outline: none;
        }
        button {
            width: 100%; padding: 20px; border: 1px solid var(--neon); background: transparent;
            color: var(--neon); font-family: 'Orbitron', sans-serif; cursor: pointer; transition: 0.4s; letter-spacing: 2px;
        }
        button:hover { background: var(--neon); color: black; box-shadow: 0 0 30px var(--neon); }

        /* Results & Terminal */
        #response-area { margin-top: 25px; display: none; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .prompt-box { font-size: 0.85rem; color: #cbd5e1; line-height: 1.6; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 4px; border-left: 2px solid var(--neon); }
        
        /* Live Activity Terminal */
        .terminal {
            margin-top: 30px; width: 500px; font-family: 'Fira Code', monospace; font-size: 0.7rem;
            color: #4ade80; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 4px; border: 1px solid rgba(74, 222, 128, 0.1);
        }
        .term-line { margin: 2px 0; opacity: 0.8; }

        /* Paywall Modal */
        #paywall {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .paywall-card {
            background: #0f172a; padding: 40px; border: 1px solid var(--alert); text-align: center; width: 350px;
        }
        .paywall-card h2 { font-family: 'Orbitron'; color: var(--alert); }
    </style>
</head>
<body>

    <div class="vault-frame">
        <h1>CORE_INTERFACE_v4</h1>
        
        <span class="label">Access Protocol</span>
        <select id="category" onchange="checkLock()">
            <optgroup label="FREE TIER">
                <option value="tiktok">Content Architect</option>
                <option value="email">Conversion Logic</option>
            </optgroup>
            <optgroup label="PREMIUM (LOCKED)">
                <option value="vc_pitch">VC Funding Pitch Deck</option>
                <option value="moat">Strategic Business Moat</option>
                <option value="shadow">Shadow-Work Marketing</option>
                <option value="ghost">Ghostwriter Protocol</option>
            </optgroup>
        </select>
        
        <span class="label">Target Objective</span>
        <input type="text" id="topic" placeholder="Specify Parameters...">
        
        <button id="mainBtn" onclick="unlock()">INITIALIZE DECRYPTION</button>

        <div id="response-area">
            <span class="label" style="color: var(--neon);">Decrypted Data:</span>
            <div class="prompt-box" id="output"></div>
        </div>
    </div>

    <div class="terminal" id="term">
        <div class="term-line">> Initializing Global Node Connection...</div>
        <div class="term-line">> Connection Established. Security Level: Alpha.</div>
    </div>

    <div id="paywall">
        <div class="paywall-card">
            <h2>ACCESS DENIED</h2>
            <p>This protocol requires Tier-2 Clearance.</p>
            <button onclick="closePaywall()" style="border-color: var(--alert); color: var(--alert);">UPGRADE CLEARANCE</button>
        </div>
    </div>

    <script>
        // Terminal Simulation
        const terminal = document.getElementById('term');
        const activities = [
            "User in Dubai unlocked [Strategic Moat]",
            "Decryption successful: node_774",
            "User in NYC initialized [Ghostwriter Protocol]",
            "New Prompt Sequence cached in Tokyo",
            "Bypassing standard AI filters..."
        ];

        setInterval(() => {
            const line = document.createElement('div');
            line.className = 'term-line';
            line.innerText = `> ${activities[Math.floor(Math.random()*activities.size)] || 'Syncing global data...'}`;
            terminal.appendChild(line);
            if(terminal.childNodes.length > 6) terminal.removeChild(terminal.childNodes[0]);
        }, 3000);

        function checkLock() {
            const cat = document.getElementById('category').value;
            const premium = ['vc_pitch', 'moat', 'shadow', 'ghost'];
            if(premium.includes(cat)) {
                document.getElementById('paywall').style.display = 'flex';
            }
        }

        function closePaywall() { document.getElementById('paywall').style.display = 'none'; document.getElementById('category').value = 'tiktok'; }

        function unlock() {
            const btn = document.getElementById('mainBtn');
            btn.innerText = "BYPASSING ENCRYPTION...";
            
            fetch('/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ category: document.getElementById('category').value, topic: document.getElementById('topic').value })
            }).then(r => r.json()).then(data => {
                document.getElementById('response-area').style.display = 'block';
                document.getElementById('output').innerText = data.result;
                btn.innerText = "INITIALIZE DECRYPTION";
            });
        }
    </script>
</body>
</html>
</html>
