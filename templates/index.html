<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROMPT VAULT | SOVEREIGN COMMAND v7</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --dark: #020617; --card: rgba(15, 23, 42, 0.9); --alert: #ff0055; }
        body, html { margin: 0; padding: 0; background: var(--dark); color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        
        /* Dashboard Grid */
        .dashboard { 
            display: grid; grid-template-columns: 280px 1fr 280px; gap: 20px; 
            padding: 30px; height: calc(100vh - 80px); align-items: start;
        }

        .side-panel { background: rgba(0,0,0,0.6); border: 1px solid rgba(0,242,255,0.1); padding: 20px; height: 100%; overflow-y: hidden; }
        
        .vault-frame {
            position: relative; padding: 40px; background: var(--card); backdrop-filter: blur(30px);
            border: 1px solid rgba(0, 242, 255, 0.2); box-shadow: 0 0 80px rgba(0,0,0,1);
        }
        
        h1 { font-family: 'Orbitron', sans-serif; font-size: 1rem; letter-spacing: 8px; color: var(--neon); text-align: center; margin-bottom: 30px; text-transform: uppercase; }
        .label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: #64748b; margin-bottom: 8px; display: block; }
        
        select, input {
            width: 100%; background: rgba(0,0,0,0.8); border: 1px solid #1e293b; padding: 14px; border-radius: 2px;
            color: white; margin-bottom: 20px; font-family: 'Inter', sans-serif; box-sizing: border-box; outline: none;
        }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }

        button {
            width: 100%; padding: 20px; border: 1px solid var(--neon); background: rgba(0, 242, 255, 0.02);
            color: var(--neon); font-family: 'Orbitron', sans-serif; font-weight: bold; cursor: pointer; transition: 0.3s; letter-spacing: 4px;
        }
        button:hover { background: var(--neon); color: black; box-shadow: 0 0 40px var(--neon); }

        #response-area { margin-top: 25px; display: none; }
        .prompt-box { 
            font-size: 0.85rem; color: #e2e8f0; line-height: 1.8; background: rgba(0,0,0,0.5); 
            padding: 25px; border-left: 2px solid var(--neon); position: relative;
        }

        .terminal {
            position: fixed; bottom: 0; width: 100%; font-family: 'Fira Code', monospace; 
            font-size: 0.65rem; color: #4ade80; background: #000; padding: 12px 25px; border-top: 1px solid rgba(74, 222, 128, 0.1);
        }

        .stat-val { color: var(--neon); font-weight: bold; font-family: 'Fira Code'; }
        
        /* Log Styling */
        .log-entry { margin-bottom: 12px; border-left: 1px solid var(--neon); padding-left: 10px; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="side-panel">
            <span class="label">Hardware Status</span>
            <div style="font-size: 0.7rem; line-height: 2;">
                NEURAL LOAD: <span class="stat-val" id="cpu-load">11.6%</span><br>
                LATENCY: <span class="stat-val" id="latency">18ms</span><br>
                UPTIME: <span class="stat-val">99.99%</span><br>
                NODE: <span class="stat-val">BAIE-MAHAULT-01</span>
            </div>
        </div>

        <div class="vault-frame">
            <h1>Sovereign_Command_v7</h1>
            
            <div class="settings-grid">
                <div>
                    <span class="label">Logic Stream</span>
                    <select id="category" onchange="checkLock()">
                        <option value="tiktok">Viral Architect</option>
                        <option value="email">Sales Logic</option>
                        <option value="vc_pitch">PREMIUM: VC Pitch</option>
                        <option value="moat">PREMIUM: Moat Logic</option>
                        <option value="shadow">PREMIUM: Shadow Psyche</option>
                    </select>
                </div>
                <div>
                    <span class="label">Neural Entropy</span>
                    <select id="entropy">
                        <option value="stable">Stable</option>
                        <option value="chaotic">Chaotic</option>
                    </select>
                </div>
            </div>
            
            <span class="label">Objective Parameters</span>
            <input type="text" id="topic" placeholder="Input target data...">
            
            <button id="mainBtn" onclick="unlock()">INITIALIZE DECRYPTION</button>

            <div id="response-area">
                <span class="label" style="color: var(--neon); margin-top: 20px;">Protocol Decrypted:</span>
                <div class="prompt-box" id="output"></div>
                <button onclick="copyText()" style="font-size: 0.6rem; padding: 10px; margin-top: 10px; border-color: #4ade80; color: #4ade80;">COPY TO CLIPBOARD</button>
            </div>
        </div>

        <div class="side-panel">
            <span class="label">Global Decryption Log</span>
            <div id="traffic-feed">
                </div>
        </div>
    </div>

    <div class="terminal" id="term">> System Ready. Awaiting instructions...</div>

    <script>
        // 1. Hardware Stats
        setInterval(() => {
            document.getElementById('cpu-load').innerText = (11 + Math.random() * 4).toFixed(1) + "%";
            document.getElementById('latency').innerText = Math.floor(12 + Math.random() * 8) + "ms";
        }, 2000);

        // 2. Log Generator
        const feed = document.getElementById('traffic-feed');
        const cityNodes = ["SEOUL", "DUBAI", "SINGAPORE", "ZUG", "REYKJAVIK"];
        
        function addEntry() {
            const node = cityNodes[Math.floor(Math.random() * cityNodes.length)];
            const id = Math.random().toString(36).substring(7).toUpperCase();
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = `<span style="color:#4ade80">[SUCCESS]</span><br><span style="color:#94a3b8">NODE:</span> ${node}_${id}`;
            feed.prepend(div);
            if(feed.childNodes.length > 8) feed.removeChild(feed.lastChild);
        }
        setInterval(addEntry, 3000);

        // 3. Logic
        function unlock() {
            const btn = document.getElementById('mainBtn');
            btn.innerText = "PENETRATING...";
            fetch('/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    category: document.getElementById('category').value, 
                    topic: document.getElementById('topic').value,
                    entropy: document.getElementById('entropy').value
                })
            }).then(r => r.json()).then(data => {
                document.getElementById('response-area').style.display = 'block';
                document.getElementById('output').innerText = data.result;
                btn.innerText = "INITIALIZE DECRYPTION";
            });
        }

        function checkLock() {
            if(document.getElementById('category').value.includes('PREMIUM')) {
                alert("ACCESS DENIED: Tier-2 Clearance Required.");
                document.getElementById('category').value = 'tiktok';
            }
        }

        function copyText() {
            navigator.clipboard.writeText(document.getElementById('output').innerText);
            document.getElementById('term').innerText = "> Data String Stored.";
        }
    </script>
</body>
</html>
