<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROMPT VAULT | SOVEREIGN COMMAND</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --dark: #020617; --card: rgba(15, 23, 42, 0.9); --alert: #ff0055; }
        body, html { margin: 0; padding: 0; background: var(--dark); color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        
        #canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        /* Dashboard Layout */
        .dashboard { 
            display: grid; 
            grid-template-columns: 1fr 600px 1fr; /* Centering the 600px engine */
            gap: 20px; padding: 40px; height: 85vh; align-items: start;
        }

        .side-panel { background: rgba(0,0,0,0.4); border: 1px solid rgba(0,242,255,0.1); padding: 20px; height: 100%; }
        
        .vault-frame {
            position: relative; padding: 40px; background: var(--card); backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 242, 255, 0.2); box-shadow: 0 0 60px rgba(0,0,0,0.9);
        }
        
        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; letter-spacing: 6px; color: var(--neon); text-align: center; margin-bottom: 30px; text-shadow: 0 0 15px var(--neon); }
        .label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: #94a3b8; margin-bottom: 8px; display: block; }
        
        select, input {
            width: 100%; background: rgba(0,0,0,0.6); border: 1px solid #334155; padding: 14px; border-radius: 4px;
            color: white; margin-bottom: 20px; font-family: 'Inter', sans-serif; box-sizing: border-box; outline: none;
        }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }

        button {
            width: 100%; padding: 22px; border: 1px solid var(--neon); background: rgba(0, 242, 255, 0.05);
            color: var(--neon); font-family: 'Orbitron', sans-serif; font-weight: bold; cursor: pointer; transition: 0.4s; letter-spacing: 3px;
        }
        button:hover { background: var(--neon); color: black; box-shadow: 0 0 40px var(--neon); }

        #response-area { margin-top: 25px; display: none; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .prompt-box { font-size: 0.8rem; color: #e2e8f0; line-height: 1.7; background: rgba(0,0,0,0.4); padding: 20px; border-left: 3px solid var(--neon); margin-bottom: 10px; }
        
        .copy-btn { font-size: 0.6rem; background: transparent; border: 1px solid #4ade80; color: #4ade80; padding: 5px 10px; width: auto; cursor: pointer; }

        .terminal {
            position: fixed; bottom: 0; width: 100%; font-family: 'Fira Code', monospace; 
            font-size: 0.65rem; color: #4ade80; background: rgba(0,0,0,0.9); padding: 15px; border-top: 1px solid rgba(74, 222, 128, 0.2);
        }

        #paywall {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 6, 23, 0.98);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="dashboard">
        <div class="side-panel">
            <span class="label">System Health</span>
            <p style="color: #4ade80; font-size: 0.7rem;">● CPU: 12%<br>● NEURAL LINK: ACTIVE<br>● ENCRYPTION: AES-512</p>
        </div>

        <div class="vault-frame">
            <h1>SOVEREIGN_COMMAND_v6</h1>
            
            <div class="settings-grid">
                <div class="setting-item">
                    <span class="label">System Mode</span>
                    <select id="category" onchange="checkLock()">
                        <option value="tiktok">Viral Architect</option>
                        <option value="email">Sales Logic</option>
                        <option value="vc_pitch">PREMIUM: VC Pitch</option>
                        <option value="moat">PREMIUM: Moat Logic</option>
                        <option value="shadow">PREMIUM: Shadow Psyche</option>
                    </select>
                </div>
                <div class="setting-item">
                    <span class="label">Entropy</span>
                    <select id="entropy">
                        <option value="stable">Stable</option>
                        <option value="chaotic">Chaotic</option>
                    </select>
                </div>
            </div>
            
            <span class="label">Target Objective</span>
            <input type="text" id="topic" placeholder="Initialize data string...">
            
            <button id="mainBtn" onclick="unlock()">RUN DECRYPTION</button>

            <div id="response-area">
                <span class="label" style="color: var(--neon);">Decrypted Output:</span>
                <div class="prompt-box" id="output"></div>
                <button class="copy-btn" onclick="copyText()">COPY TO CLIPBOARD</button>
            </div>
        </div>

        <div class="side-panel">
            <span class="label">Global Traffic</span>
            <div id="traffic-feed" style="font-size: 0.6rem; color: #64748b;"></div>
        </div>
    </div>

    <div class="terminal" id="term">> System Online... Ready for Command.</div>

    <div id="paywall">
        <div style="border: 1px solid var(--alert); padding: 50px; text-align: center; background: #020617;">
            <h2 style="font-family: Orbitron; color: var(--alert);">ACCESS DENIED</h2>
            <button onclick="closePaywall()" style="border-color: var(--alert); color: var(--alert);">UPGRADE CLEARANCE</button>
        </div>
    </div>

    <script>
        // Matrix Background
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const dots = [];
        for(let i=0; i<80; i++) dots.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3});
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0, 242, 255, 0.2)";
            dots.forEach(d => {
                d.x += d.vx; d.y += d.vy;
                ctx.beginPath(); ctx.arc(d.x, d.y, 1, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();

        // Traffic Feed
        const feed = document.getElementById('traffic-feed');
        setInterval(() => {
            const lines = ["Node 04: Connected", "Syncing HKG...", "User 991: Active", "Data Cached"];
            const p = document.createElement('div');
            p.innerText = `> ${lines[Math.floor(Math.random()*lines.length)]}`;
            feed.prepend(p);
            if(feed.childNodes.length > 10) feed.removeChild(feed.lastChild);
        }, 2000);

        function checkLock() { if(document.getElementById('category').value.includes('PREMIUM')) document.getElementById('paywall').style.display = 'flex'; }
        function closePaywall() { document.getElementById('paywall').style.display = 'none'; document.getElementById('category').value = 'tiktok'; }

        function unlock() {
            fetch('/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    category: document.getElementById('category').value, 
                    topic: document.getElementById('topic').value,
                    entropy: document.getElementById('entropy').value
                })
            }).then(r => r.json()).then(data => {
                document.getElementById('response-area').style.display = 'block';
                document.getElementById('output').innerText = data.result;
            });
        }

        function copyText() {
            navigator.clipboard.writeText(document.getElementById('output').innerText);
            alert("Protocol Copied to Clipboard.");
        }
    </script>
</body>
</html>
