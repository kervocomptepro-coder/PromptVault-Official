<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROMPT VAULT | NEURAL INTERFACE v5.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --dark: #020617; --card: rgba(15, 23, 42, 0.85); --alert: #ff0055; }
        body, html { margin: 0; padding: 0; background: var(--dark); color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        
        /* Animated Background */
        #canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .vault-frame {
            position: relative; width: 550px; padding: 40px; background: var(--card); backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 242, 255, 0.2); box-shadow: 0 0 60px rgba(0,0,0,0.9);
            animation: bootUp 1s ease-out;
        }
        @keyframes bootUp { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .vault-frame::before { content: ""; position: absolute; top: -2px; left: -2px; width: 40px; height: 40px; border-top: 2px solid var(--neon); border-left: 2px solid var(--neon); }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; letter-spacing: 6px; color: var(--neon); text-align: center; margin-bottom: 30px; text-shadow: 0 0 15px var(--neon); }
        
        .label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: #94a3b8; margin-bottom: 8px; display: block; }
        
        select, input {
            width: 100%; background: rgba(0,0,0,0.6); border: 1px solid #334155; padding: 14px; border-radius: 4px;
            color: white; margin-bottom: 20px; font-family: 'Inter', sans-serif; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        select:focus, input:focus { border-color: var(--neon); }

        /* Settings Grid */
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .setting-item { background: rgba(0,0,0,0.3); padding: 10px; border: 1px solid rgba(255,255,255,0.05); }

        button {
            width: 100%; padding: 22px; border: 1px solid var(--neon); background: rgba(0, 242, 255, 0.05);
            color: var(--neon); font-family: 'Orbitron', sans-serif; font-weight: bold; cursor: pointer; transition: 0.4s; letter-spacing: 3px;
        }
        button:hover { background: var(--neon); color: black; box-shadow: 0 0 40px var(--neon); transform: translateY(-2px); }

        #response-area { margin-top: 25px; display: none; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .prompt-box { font-size: 0.8rem; color: #e2e8f0; line-height: 1.7; background: rgba(0,0,0,0.4); padding: 20px; border-left: 3px solid var(--neon); white-space: pre-wrap; }
        
        .terminal {
            position: fixed; bottom: 20px; width: 90%; max-width: 1000px; font-family: 'Fira Code', monospace; 
            font-size: 0.65rem; color: #4ade80; background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid rgba(74, 222, 128, 0.2);
        }

        #paywall {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 6, 23, 0.95);
            display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(10px);
        }
        .paywall-card { border: 1px solid var(--alert); padding: 50px; text-align: center; background: #020617; box-shadow: 0 0 50px var(--alert); }
        .paywall-card h2 { font-family: 'Orbitron'; color: var(--alert); letter-spacing: 5px; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="vault-frame">
        <h1>PROMPT_ENGINE_ULTIMATE</h1>
        
        <div class="settings-grid">
            <div class="setting-item">
                <span class="label">System Mode</span>
                <select id="category" onchange="checkLock()">
                    <option value="tiktok">Viral Architect</option>
                    <option value="email">Sales Logic</option>
                    <option value="vc_pitch">PREMIUM: VC Pitch</option>
                    <option value="moat">PREMIUM: Moat Logic</option>
                    <option value="shadow">PREMIUM: Shadow Psyche</option>
                    <option value="whale">PREMIUM: Crypto Whale</option>
                </select>
            </div>
            <div class="setting-item">
                <span class="label">Output Entropy</span>
                <select id="entropy">
                    <option value="stable">Stable (Logic)</option>
                    <option value="chaotic">Chaotic (Creative)</option>
                </select>
            </div>
        </div>
        
        <span class="label">Target Objective</span>
        <input type="text" id="topic" placeholder="Initialize data string...">
        
        <button id="mainBtn" onclick="unlock()">RUN DECRYPTION SEQUENCE</button>

        <div id="response-area">
            <span class="label" style="color: var(--neon);">Decrypted Output:</span>
            <div class="prompt-box" id="output"></div>
        </div>
    </div>

    <div class="terminal" id="term">
        <div>> System Online. Waiting for input...</div>
    </div>

    <div id="paywall">
        <div class="paywall-card">
            <h2>ACCESS_DENIED</h2>
            <p style="color: #64748b; margin-bottom: 30px;">Protocol requires LEVEL 5 clearance.</p>
            <button onclick="closePaywall()" style="border-color: var(--alert); color: var(--alert); background: rgba(255,0,85,0.05);">UPGRADE CLEARANCE</button>
        </div>
    </div>

    <script>
        // Matrix Canvas Effect
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const dots = [];
        for(let i=0; i<100; i++) dots.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5});
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0, 242, 255, 0.3)";
            dots.forEach(d => {
                d.x += d.vx; d.y += d.vy;
                if(d.x < 0 || d.x > canvas.width) d.vx *= -1;
                if(d.y < 0 || d.y > canvas.height) d.vy *= -1;
                ctx.beginPath(); ctx.arc(d.x, d.y, 1, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();

        function checkLock() {
            const cat = document.getElementById('category').value;
            if(cat.includes('PREMIUM')) document.getElementById('paywall').style.display = 'flex';
        }

        function closePaywall() { document.getElementById('paywall').style.display = 'none'; document.getElementById('category').value = 'tiktok'; }

        function unlock() {
            const btn = document.getElementById('mainBtn');
            const term = document.getElementById('term');
            btn.innerText = "BYPASSING FIREWALL...";
            const line = document.createElement('div');
            line.innerText = `> Initializing sequence for: ${document.getElementById('topic').value}...`;
            term.appendChild(line);

            fetch('/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    category: document.getElementById('category').value, 
                    topic: document.getElementById('topic').value,
                    entropy: document.getElementById('entropy').value
                })
            }).then(r => r.json()).then(data => {
                document.getElementById('response-area').style.display = 'block';
                document.getElementById('output').innerText = data.result;
                btn.innerText = "RUN DECRYPTION SEQUENCE";
            });
        }
    </script>
</body>
</html>
