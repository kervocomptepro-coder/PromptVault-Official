<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROMPT VAULT | NEURAL INTERFACE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --dark: #020617; --card: rgba(15, 23, 42, 0.7); }
        body { 
            margin: 0; background: var(--dark); color: white; 
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .vault-frame {
            position: relative; width: 450px; padding: 40px;
            background: var(--card); backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 2px; /* Sharp technical edges */
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(0, 242, 255, 0.05);
        }
        /* The Glowing Corner Accents */
        .vault-frame::before { content: ""; position: absolute; top: -2px; left: -2px; width: 20px; height: 20px; border-top: 2px solid var(--neon); border-left: 2px solid var(--neon); }
        .vault-frame::after { content: ""; position: absolute; bottom: -2px; right: -2px; width: 20px; height: 20px; border-bottom: 2px solid var(--neon); border-right: 2px solid var(--neon); }
        
        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 30px; color: var(--neon); text-shadow: 0 0 10px rgba(0,242,255,0.5); }
        
        .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #64748b; margin-bottom: 8px; display: block; }
        
        select, input {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #1e293b;
            padding: 15px; border-radius: 4px; color: white; margin-bottom: 25px;
            font-family: 'Inter', sans-serif; box-sizing: border-box; outline: none;
            transition: 0.3s;
        }
        select:focus, input:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(0,242,255,0.2); }

        button {
            width: 100%; padding: 20px; border: 1px solid var(--neon);
            background: transparent; color: var(--neon); font-family: 'Orbitron', sans-serif;
            font-weight: bold; cursor: pointer; transition: 0.4s; letter-spacing: 2px;
        }
        button:hover { background: var(--neon); color: black; box-shadow: 0 0 30px var(--neon); }

        #response-area {
            margin-top: 30px; display: none;
            border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;
        }
        .prompt-box {
            font-size: 0.9rem; color: #cbd5e1; line-height: 1.6;
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="vault-frame">
        <h1>PROMPT // VAULT</h1>
        
        <span class="label">System Protocol</span>
        <select id="category">
            <option value="tiktok">CONTENT ARCHITECT</option>
            <option value="email">CONVERSION LOGIC</option>
            <option value="business">STRATEGIC MOAT</option>
        </select>
        
        <span class="label">Input Parameter</span>
        <input type="text" id="topic" placeholder="System Objective...">
        
        <button onclick="unlock()">INITIALIZE UNLOCK</button>

        <div id="response-area">
            <span class="label" style="color: var(--neon);">Decrypted Output:</span>
            <div class="prompt-box" id="output"></div>
        </div>
    </div>

    <script>
        function unlock() {
            const btn = document.querySelector('button');
            btn.innerText = "DECRYPTING...";
            
            fetch('/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    category: document.getElementById('category').value,
                    topic: document.getElementById('topic').value
                })
            }).then(r => r.json()).then(data => {
                document.getElementById('response-area').style.display = 'block';
                document.getElementById('output').innerText = data.result;
                btn.innerText = "INITIALIZE UNLOCK";
            });
        }
    </script>
</body>
</html>
